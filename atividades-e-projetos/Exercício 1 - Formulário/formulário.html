<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Mini sobre você</h1>
    <form method="get" action="teste.jsp">
        Qual seu nome/apelido preferido? 💕 <input type="text" name="nome"><br>
        Email: <input type="email" name="email">
        <br>
        Qual emoji te representa hoje? 😎✨
        <input type="radio" name="emoji" value="1" checked> 😍
        <input type="radio" name="emoji" value="2"> 😆
        <input type="radio" name="emoji" value="3"> 🤬
        <input type="radio" name="emoji" value="4"> 👿
        <br>
        Uma coisa simples que te faz feliz? 🌷
        <select name="coisa">
            <option>Comer</option>
            <option>Passear</option>
            <option>Ler</option>
            <option>Ver filmes</option>
        </select>
        <br>
        Se fosse uma cor pastel, qual seria? 🎨
        <input type="checkbox" name="cor1" value="sim">Azul
        <input type="checkbox" name="cor2" value="sim">Rosa
        <input type="checkbox" name="cor3" value="sim">Lilas
        <input type="checkbox" name="cor4" value="sim">Amarelo
        <br>
        Data do seu aniversário: <input type="date" name="niver">
        <br>
        Digite algo positivo para os próximos dias:
        <br>
        <textarea name="mensagem" rows="10" cols="30"></textarea>
        

        <br><input type="submit">




    </form>
    
</body>
</html>
